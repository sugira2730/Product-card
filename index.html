<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Single Product Card</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>

    <main class="container">
        <article class="product-card">

            <div class="product-image">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTTYAx3hqK3b3i-JGJlw7nhqqrccJtkMnNv8Q&s" class="image-box" alt="Product image">
            </div>

            <div class="product-info">
                <h2 class="product-title">smart-phone</h2>
                <p class="product-description">
                    smart phone with high technology and good features.
                </p>

                <div class="product-footer">
                    <span class="product-price">$129.99</span>
                    <button class="btn-add">Add to Cart</button>
                </div>
            </div>

        </article>
    </main>

</body>
</html>
