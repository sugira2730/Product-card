<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Single Product Card</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>

    <main class="container">
        <article class="product-card">

            <div class="product-image">
                <img src="https://i5.walmartimages.com/seo/HP-15-6-Touch-Screen-Laptop-Intel-Core-i3-8GB-Memory-256GB-SSD-Silver-Notebook-PC_435571a0-a644-4f27-9e39-19e6c16f76c0.74549be46a6830f4a58dcf9502abc982.jpeg" class="image-box" alt="Product image">
            </div>

            <div class="product-info">
                <h2 class="product-title">laptop</h2>
                <p class="product-description">
                    laptop with high speed and enough storage.
                </p>

                <div class="product-footer">
                    <span class="product-price">$129.99</span>
                    <button class="btn-add">Add to Cart</button>
                </div>
            </div>

        </article>
    </main>

</body>
</html>
